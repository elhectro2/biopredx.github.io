<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">

{% seo %}
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" as="style" type="text/css" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SFW2WVHKT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5SFW2WVHKT');
</script>
  
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>
    <h3 style="text-align: center;"> <a  href="/biopredx.github.io/en/index.html"> Switch to English </h3>

    <header class="page-header" role="banner">
      <h1> <a href="/biopredx.github.io/"> <img src="./assets/image/BioPredX_logo.png" width=75%></a> </h1>
      <h1 class="Row" align center>
  {% for item in site.data.navigation %}
    <div class="Column"><a href="{{ item.link }}"{% capture fullurl %}{{ site.baseurl }}{{ entry.url }}{% endcapture %}{% if fullurl == page.url %}class="current"{% endif %}>{{ item.name }}</a></div>
  {% endfor %}
  </h1>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>
  </body>
</html>
